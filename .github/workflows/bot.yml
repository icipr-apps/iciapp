name: FB Video Bot — Manual

on:
  workflow_dispatch:
    inputs:
      publisher:
        description: '👤 الناشر (ALL = جميع الصفحات)'
        required: false
        default: 'ALL'
        type: choice
        options:
          - ALL
          - m4
          - ici
          - chouf

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg wget

      - name: Install Python dependencies
        run: |
          pip install yt-dlp cloudinary requests Pillow

      - name: Write cookies file
        run: |
          if [ -n "${{ secrets.FB_COOKIES }}" ]; then
            echo "${{ secrets.FB_COOKIES }}" > /tmp/cookies.txt
            echo "✅ Cookies written"
          else
            echo "⚠️ No FB_COOKIES secret"
          fi

      - name: Process and publish video
        env:
          VIDEO_PUBLISHER:       ${{ github.event.inputs.publisher }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          WEBHOOK_URL:           ${{ secrets.WEBHOOK_URL }}
        run: python bot.py
